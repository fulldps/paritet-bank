services:
  postgres:
    image: postgres:16-alpine
    container_name: paritet_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-paritet}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-paritet_secret}
      POSTGRES_DB: ${DB_NAME:-paritet_bank}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-paritet} -d ${DB_NAME:-paritet_bank}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: paritet_backend_dev
    restart: unless-stopped
    env_file:
      - ./server/.env
    environment:
      DB_HOST: postgres
    ports:
      - '3000:3000'
    volumes:
      - ./server/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: paritet_frontend_dev
    restart: unless-stopped
    ports:
      - '5173:5173'
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./index.html:/app/index.html
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./tsconfig.app.json:/app/tsconfig.app.json
      - ./tsconfig.node.json:/app/tsconfig.node.json
      - ./tsconfig.vitest.json:/app/tsconfig.vitest.json
      - ./tailwind.config.ts:/app/tailwind.config.ts
    environment:
      - VITE_API_URL=http://localhost:3000/api
    depends_on:
      - backend

volumes:
  postgres_data:
