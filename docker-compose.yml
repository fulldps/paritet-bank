services:
  postgres:
    image: postgres:16-alpine
    container_name: paritet_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-paritet}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-paritet_secret}
      POSTGRES_DB: ${DB_NAME:-paritet_bank}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-paritet} -d ${DB_NAME:-paritet_bank}']
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: paritet_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@paritet.by}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - '5050:80'
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev

volumes:
  postgres_data:
